name: PR drain (close-stale + reconcile)

# CLOSE-STALE + DIRTY-CONFLICT + RECONCILE, via the shared reusable.
# Reusable: SuxOS/.github/.github/workflows/pr-drain.yml
# required-gates match this repo's branch-protection required checks so RECONCILE's
# branch-protection assertion never re-arms auto-merge when a security gate is missing.

on:
  schedule:
    - cron: "19 * * * *" # hourly
  workflow_dispatch:

jobs:
  drain:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
