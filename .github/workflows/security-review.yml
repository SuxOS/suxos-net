name: Security review (no-dumb-shit bot)

# Every PR gets a focused SECURITY review before it can merge, hard-blocking on a
# high/critical finding by applying `hold`. Given this repo will eventually front real
# access-gated content, this gate is NOT optional — fail-closed, same as elsewhere in
# the fabric. Author-gated (never runs for fork/external PRs).
# Reusable workflow: SuxOS/.github/.github/workflows/security-review.yml

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  security-review:
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/security-review.yml@main
    with:
      allowed-bots: "suxbot[bot]"
    secrets: inherit
